{% extends 'base.html' %}

{% block title %}Vérification OTP{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
        
        <h3 class="text-center mb-4">Vérification OTP</h3>

        <!-- Message info -->
        <p class="text-center text-muted">
            Entrez le code envoyé à votre email/SMS
        </p>

        <!-- Formulaire (frontend seulement) -->
        <form>
            
            <div class="mb-3">
                <label class="form-label">Code OTP</label>
                <input type="text" class="form-control text-center" placeholder="123456" maxlength="6">
            </div>

            <!-- Message erreur (frontend fake) -->
            <div class="alert alert-danger text-center" style="display: none;">
                Code incorrect
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Vérifier
            </button>
        </form>

        <!-- Actions -->
        <div class="text-center mt-3">
            <a href="#" class="text-decoration-none">Renvoyer le code</a>
        </div>

    </div>
</div>
{% endblock %}
