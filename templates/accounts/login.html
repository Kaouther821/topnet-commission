{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="card auth-card p-4">
    <div class="card-body">
        <h2 class="text-center auth-title mb-4">Connexion</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="/login/">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="Entrer votre nom d'utilisateur">
            </div>

            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="Entrer votre mot de passe">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
