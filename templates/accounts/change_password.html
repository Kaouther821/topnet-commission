{% extends 'base.html' %}

{% block title %}Changer le mot de passe{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow-sm mx-auto" style="max-width: 450px;">
        <h3 class="text-center mb-4">Changer le mot de passe</h3>

        <p class="text-center text-muted">
            Veuillez définir un nouveau mot de passe sécurisé.
        </p>

        <form>
            <div class="mb-3">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" class="form-control" placeholder="Entrer nouveau mot de passe">
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmer le mot de passe</label>
                <input type="password" class="form-control" placeholder="Confirmer le mot de passe">
            </div>

            <div class="alert alert-warning">
                Le mot de passe doit contenir au moins 8 caractères.
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Enregistrer
            </button>
        </form>
    </div>
</div>
{% endblock %}
