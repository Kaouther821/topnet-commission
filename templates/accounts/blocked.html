{% extends 'base.html' %}

{% block title %}Compte bloqué{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    
    <div class="card p-5 shadow-sm mx-auto" style="max-width: 450px;">
        
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 50px;"></i>
        </div>

        <h3 class="mb-3 text-danger">Compte bloqué</h3>

        <p class="text-muted">
            Votre compte est temporairement bloqué après plusieurs tentatives échouées.
        </p>

        <p class="text-muted">
            Veuillez contacter l’administrateur ou réessayer plus tard.
        </p>

        <a href="/login/" class="btn btn-primary mt-3">
            Retour à la connexion
        </a>

    </div>

</div>
{% endblock %}
